[functions]
  directory = "netlify/functions"
  included_files = ["netlify/functions/mail.config.json"]

[[redirects]]
  from = "/api/reservations"
  to = "/.netlify/functions/reservation"
  status = 200
  force = true

[[redirects]]
  from = "/netlify/functions/*"
  to = "/404.html"
  status = 404
  force = true
